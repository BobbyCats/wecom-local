name: Bug report
description: Report a reproducible problem without sharing private WeCom data.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include real chat history, real conversation ids, private group names, contact names, screenshots, raw keys, database files, memory dumps, or exported files.
  - type: input
    id: command
    attributes:
      label: Command
      description: The command that failed. Redact conversation references.
      placeholder: wecom-local history "<redacted-reference>" -n 10 --format json
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error category or sanitized output shape only.
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: 26.4.1
  - type: input
    id: wecom
    attributes:
      label: WeCom Desktop version
      placeholder: 5.0.8 (70666)
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed real chat content, ids, names, screenshots, keys, DB files, and exports.
          required: true
