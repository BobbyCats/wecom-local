name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos:
    name: macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Validate
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test

      - name: Build release binary
        run: cargo build --release

      - name: Package
        run: |
          case "$(uname -m)" in
            arm64) target="aarch64-apple-darwin" ;;
            x86_64) target="x86_64-apple-darwin" ;;
            *) echo "unsupported macOS architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          name="wecom-local-${GITHUB_REF_NAME}-${target}"
          mkdir -p "dist/${name}"
          cp target/release/wecom-local "dist/${name}/wecom-local"
          cp README.md README.en.md LICENSE "dist/${name}/"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          shasum -a 256 "dist/${name}.tar.gz" > "dist/${name}.tar.gz.sha256"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/release-notes/${{ github.ref_name }}.md
          files: |
            dist/*.tar.gz
            dist/*.sha256
